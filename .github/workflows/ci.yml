name: Java CI

on:
    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source code
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: 21
                cache: gradle

            - name: Grant execute permission for Gradle wrapper
              run: chmod +x gradlew

            - name: Run tests
              run: ./gradlew test

            - name: Build
              run: ./gradlew build